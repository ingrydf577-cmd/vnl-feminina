<body>

<header class="hero pagina-jogos">
  <h1>🔔 Cadastro de Notificações</h1>
  <p>Receba alertas sobre jogos, resultados e classificações da VNL Feminina.</p>
</header>

<nav class="menu">
  <a href="index.html">🏠 Home</a>
  <a href="jogos.html">📅 Jogos</a>

<main class="home">

  <section class="card" style="max-width:600px; margin:auto;">

    <h2>🏐 Criar Conta</h2>

    <form class="form-notificacao">

      <input type="text" placeholder="Seu nome" required>

      <input type="email" placeholder="Seu e-mail" required>

      <select>
        <option>Seleção favorita</option>
        <option>🇧🇷 Brasil</option>
        <option>🇺🇸 Estados Unidos</option>
        <option>🇮🇹 Itália</option>
        <option>🇵🇱 Polônia</option>
        <option>🇯🇵 Japão</option>
        <option>🇨🇳 China</option>
        <option>🇹🇷 Turquia</option>
      </select>

      <button type="button" onclick="alert('Cadastro realizado com sucesso! Você receberá notificações da VNL.')">
  Cadastrar
</button>

    </form>

    <br>

    <a href="index.html" class="btn-cadastro">
      ← Voltar para Home
    </a>

  </section>

</main>

<footer>
  <p>🏐 VNL Tracker • Projeto acadêmico</p>
</footer>
